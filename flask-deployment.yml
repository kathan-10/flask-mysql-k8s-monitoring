apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: flask

  template:
    metadata:
      labels:
        app: flask

    spec:
      containers:
      - name: flask

        image: kathan1205/devops-project:1

        imagePullPolicy: Always

        ports:
        - containerPort: 5000
